version: '3.9'

services:
  passport_llm_service:
    build: .
    image: passport_llm_service:latest
    container_name: passport_llm_container
    volumes:
      - ./api_keys.env:/api_keys.env
      - ./logs:/app/logs
    ports:
      - "8001:8001"
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3